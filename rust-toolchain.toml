# Pinned to 1.95.0 — the lowest stable that (a) compiles `dbsp` 0.320 without the next-trait-solver
# ICE that lands on 1.97 (rustc_next_trait_solver/.../structural_traits.rs, release mode) and (b)
# meets reth's MSRV (rust-version = "1.95"), so the `nuthatch-node` ExEx build (RFC-0003) can reuse
# the same dbsp-containing core. Verified: full test suite + clippy green on 1.95.0. Keeps local
# builds, CI, `cargo publish`, and the release binary consistent. Revisit when the 1.97 ICE is fixed.
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
